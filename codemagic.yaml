workflows:
  ios-unsigned:
    name: PAPAHA VPN iOS Unsigned IPA
    max_build_duration: 60
    environment:
      flutter: 3.44.1
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS unsigned
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/Runner.app
          zip -qr ../../../PAPAHA-VPN.ipa Payload
    artifacts:
      - PAPAHA-VPN.ipa
 