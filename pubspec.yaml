name: papaha_vpn
description: PAPAHA VPN - Secure VPN App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.4.9

  # HTTP
  dio: ^5.4.0
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.2.2

  # Device info
  device_info_plus: ^9.1.1

  # URL launcher
  url_launcher: ^6.2.4

  # Icons
  cupertino_icons: ^1.0.6

  # Toast notifications
  fluttertoast: ^8.2.4

  # VPN core - v2ray/xray with full VPN mode support
  flutter_v2ray_plus: ^1.0.0

  # Home screen widget
  home_widget: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 21
